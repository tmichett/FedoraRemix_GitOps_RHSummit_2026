<button class="theme-toggle btn btn-outline" id="theme-toggle" aria-label="Toggle light/dark theme">
  <span id="theme-toggle-dark" title="Switch to light theme">&#9790; Dark</span>
  <span id="theme-toggle-light" title="Switch to dark theme" style="display:none;">&#9788; Light</span>
</button>

<script>
(function() {
  var defaultTheme = "fedora";
  var altTheme = "fedora-light";
  var toggle = document.getElementById("theme-toggle");
  var darkLabel = document.getElementById("theme-toggle-dark");
  var lightLabel = document.getElementById("theme-toggle-light");

  function updateLabels(current) {
    if (current === altTheme) {
      darkLabel.style.display = "none";
      lightLabel.style.display = "inline";
    } else {
      darkLabel.style.display = "inline";
      lightLabel.style.display = "none";
    }
  }

  var saved = localStorage.getItem("jtd-theme") || defaultTheme;
  updateLabels(saved);

  toggle.addEventListener("click", function() {
    var current = localStorage.getItem("jtd-theme") || defaultTheme;
    var next = (current === defaultTheme) ? altTheme : defaultTheme;
    jtd.setTheme(next);
    localStorage.setItem("jtd-theme", next);
    updateLabels(next);
  });
})();
</script>
