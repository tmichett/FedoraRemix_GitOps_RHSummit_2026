name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Quickstart Guides from Fedora_Remix
        run: |
          curl -sSL -o docs/Quickstart_Container.md \
            https://raw.githubusercontent.com/tmichett/Fedora_Remix/main/Quickstart_Container.md
          curl -sSL -o docs/Quickstart_Physical.md \
            https://raw.githubusercontent.com/tmichett/Fedora_Remix/main/Quickstart_Physical.md

          prepend_front_matter() {
            local filepath="$1" title="$2" order="$3"
            local tmp
            tmp=$(mktemp)
            printf -- '---\ntitle: "%s"\nlayout: default\nparent: Home\nnav_order: %s\n---\n\n' \
              "$title" "$order" > "$tmp"
            cat "$filepath" >> "$tmp"
            mv "$tmp" "$filepath"
          }

          prepend_front_matter "docs/Quickstart_Container.md" "Quickstart: Container Build" "1"
          prepend_front_matter "docs/Quickstart_Physical.md" "Quickstart: Physical/VM Build" "2"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
